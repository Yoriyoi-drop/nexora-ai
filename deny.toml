[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"
notice = "warn"
ignore = []

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
]
deny = []
copyleft = "deny"
allow-osi-fsf-free = "neither"
default = "deny"
confidence-threshold = 0.8

[bans]
multiple-versions = "deny"
wildcards = "deny"
deny = []
skip = [
    { name = "bitflags", version = "1" },
    { name = "bitflags", version = "2" },
    { name = "windows-sys", version = "0.48" },
    { name = "windows-sys", version = "0.52" },
    { name = "windows-targets", version = "0.48" },
    { name = "windows-targets", version = "0.52" },
    { name = "windows_aarch64_msvc", version = "0.48" },
    { name = "windows_aarch64_msvc", version = "0.52" },
    { name = "windows_i686_gnu", version = "0.48" },
    { name = "windows_i686_gnu", version = "0.52" },
    { name = "windows_i686_msvc", version = "0.48" },
    { name = "windows_i686_msvc", version = "0.52" },
    { name = "windows_x86_64_gnu", version = "0.48" },
    { name = "windows_x86_64_gnu", version = "0.52" },
    { name = "windows_x86_64_msvc", version = "0.48" },
    { name = "windows_x86_64_msvc", version = "0.52" },
    { name = "anstyle", version = "1" },
    { name = "anstyle-parse", version = "0.2" },
    { name = "anstyle-query", version = "1" },
    { name = "anstyle-wincon", version = "3" },
    { name = "errno", version = "0.2" },
    { name = "errno", version = "0.3" },
    { name = "regex-automata", version = "0.1" },
    { name = "regex-automata", version = "0.4" },
    { name = "regex-syntax", version = "0.6" },
    { name = "regex-syntax", version = "0.8" },
    { name = "syn", version = "1" },
    { name = "syn", version = "2" },
    { name = "hashbrown", version = "0.12" },
    { name = "hashbrown", version = "0.14" },
    { name = "quote", version = "1" },
    { name = "proc-macro2", version = "1" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
