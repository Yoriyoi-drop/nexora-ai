# Nextest configuration for SACA project
# This file configures cargo-nextest behavior

[store]
# Directory where nextest stores its data
dir = "target/nextest"

[profile.default]
# Default profile for running tests
retries = { backoff = "fixed", count = 2, delay = "1s" }
test-threads = 4
slow-timeout = { period = "60s", terminate-after = 2 }

[profile.ci]
# Profile for CI environments
retries = { backoff = "fixed", count = 3, delay = "1s" }
test-threads = 8
slow-timeout = { period = "120s", terminate-after = 3 }
fail-fast = false

[profile.integration]
# Profile for integration tests
retries = { backoff = "exponential", count = 3, delay = "1s" }
test-threads = 2
slow-timeout = { period = "300s", terminate-after = 1 }

[[profile.default.overrides]]
filter = 'test(test_integration)'
test-threads = 1
slow-timeout = { period = "600s", terminate-after = 1 }

[[profile.default.overrides]]
filter = 'test(test_bench)'
test-threads = 2
slow-timeout = { period = "1800s", terminate-after = 1 }

[[profile.default.overrides]]
filter = 'package:nexora-api'
test-threads = 2
slow-timeout = { period = "30s", terminate-after = 1 }

[[profile.default.overrides]]
filter = 'package:nexora-common'
test-threads = 3
slow-timeout = { period = "30s", terminate-after = 1 }

[[profile.default.overrides]]
filter = 'package:nexora-models'
test-threads = 1
slow-timeout = { period = "120s", terminate-after = 1 }

# Display configuration
[display]
# Use colors in output
color = "auto"
# Show progress bar
progress-bar = "auto"
# Show test execution times
show-times = true
